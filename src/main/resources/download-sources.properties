# Download source configuration
# You can override these values by placing another file at:
#   ./download-sources.properties
# or passing JVM arg:
#   -Denvlauncher.sources=E:/path/to/download-sources.properties

# Preferred JDK mode: dynamic URL template (replace {version})
# This avoids breakage when exact archive filename changes.
jdk.url-template=https://api.adoptium.net/v3/binary/latest/{version}/ga/windows/x64/jdk/hotspot/normal/eclipse

# Fallback JDK base URL (used when template is empty or invalid)
jdk.base-url=https://mirrors.tuna.tsinghua.edu.cn/Adoptium/
maven.base-url=https://archive.apache.org/dist/maven/maven-3/
node.base-url=https://npmmirror.com/mirrors/node/
